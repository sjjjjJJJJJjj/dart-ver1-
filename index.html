    let currentFilter = 'all';
    let searchQuery = '';

    function getStatusStyle(status) {
      if (status === '우선영업')   return { badge:'bg-orange-50 text-orange-600', bar:'bg-orange-400', icon:'text-orange-500' };
      if (status === '유동성경보') return { badge:'bg-red-50 text-red-600',     bar:'bg-red-400',    icon:'text-red-500' };
      return                               { badge:'bg-blue-50 text-blue-600',   bar:'bg-blue-300',   icon:'text-blue-500' };
    }

    function getRatioColor(r) {
      if (r >= 200) return 'text-orange-500';
      if (r >= 150) return 'text-green-600';
      if (r >= 100) return 'text-blue-600';
      return 'text-red-500';
    }

    function renderCompanies() {
      const grid     = document.getElementById('company-grid');
      const noResult = document.getElementById('no-result');

      const filtered = companies.filter(c => {
        const matchFilter =
          currentFilter === 'all' ||
          (currentFilter === 'priority' && c.status === '우선영업') ||
          (currentFilter === 'alert'    && c.status === '유동성경보') ||
          (currentFilter === 'normal'   && c.status === '일반관찰');
        const q = searchQuery.toLowerCase();
        const matchSearch = !q ||
          c.name.includes(q) || c.code.includes(q) || c.sector.includes(q);
        return matchFilter && matchSearch;
      });

      grid.innerHTML = '';
      if (filtered.length === 0) { noResult.classList.remove('hidden'); return; }
      noResult.classList.add('hidden');

      filtered.forEach(c => {
        const s = getStatusStyle(c.status);
        const ratioColor = getRatioColor(c.currentRatio);
        const barWidth   = Math.min(c.currentRatio / 3.5, 100).toFixed(1);

        const card = document.createElement('div');
        card.className = "bg-white rounded-2xl p-6 border border-gray-100 hover:border-orange-200 hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer group";
        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="font-bold text-gray-900 text-lg group-hover:text-[#f37321] transition">${c.name}</h3>
              <p class="text-xs font-mono text-gray-400">${c.code} · ${c.sector}</p>
            </div>
            <span class="text-[11px] px-2.5 py-1 rounded-full font-bold ${s.badge}">${c.status}</span>
          </div>
          <div class="space-y-3 pt-4 border-t border-gray-50">
            <div class="flex justify-between items-center">
              <span class="text-sm text-gray-500">추정 유동자금</span>
              <span class="font-bold text-gray-800">${c.liquidity}</span>
            </div>
            <div>
              <div class="flex justify-between text-xs mb-1">
                <span class="text-gray-400">유동비율</span>
                <span class="font-bold ${ratioColor}">${c.currentRatio}%</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-1.5">
                <div class="h-1.5 rounded-full ${s.bar}" style="width:${barWidth}%"></div>
              </div>
            </div>
            <div class="flex items-center gap-2 p-2.5 bg-gray-50 rounded-lg">
              <i data-lucide="zap" class="w-3.5 h-3.5 flex-shrink-0 ${s.icon}"></i>
              <span class="text-xs text-gray-600">${c.issue}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    function filterCompanies(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('bg-[#f37321]', 'text-white');
        btn.classList.add('bg-white', 'border', 'border-gray-200', 'text-gray-600');
      });
      const active = document.getElementById('filter-' + type);
      active.classList.add('bg-[#f37321]', 'text-white');
      active.classList.remove('bg-white', 'border', 'border-gray-200', 'text-gray-600');
      renderCompanies();
    }

    // KPI 통계
    document.getElementById('total-count').textContent    = companies.length + '개 기업';
    document.getElementById('alert-count').textContent    = companies.filter(c => c.status === '유동성경보').length + '건 발견';
    document.getElementById('priority-count').textContent = companies.filter(c => c.status === '우선영업').length + '개 기업';

    // 검색
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderCompanies();
    });

    renderCompanies();
  </script>
